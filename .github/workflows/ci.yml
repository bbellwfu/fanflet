name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [develop]

jobs:
  quality:
    name: Lint, Type-check & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check migrations idempotent
        run: bash .github/scripts/check-migrations-idempotent.sh

      - name: Check MCP client isolation
        run: bash .github/scripts/check-mcp-client-isolation.sh

      - name: Check sponsor entitlement guards
        run: bash .github/scripts/check-sponsor-entitlements.sh

      - name: Check pricing page feature metadata
        run: node .github/scripts/check-pricing-metadata.js

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --workspace=@fanflet/web

      - name: Type-check
        run: npx tsc --noEmit
        working-directory: apps/web

      - name: Test MCP security
        run: npm test --workspace=@fanflet/mcp

      - name: Test Web
        run: npm test --workspace=@fanflet/web

      - name: Test Core
        run: npm test --workspace=@fanflet/core

      - name: Build Web
        run: npm run build --workspace=@fanflet/web
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-key-for-build
          NEXT_PUBLIC_SITE_URL: https://fanflet.com
